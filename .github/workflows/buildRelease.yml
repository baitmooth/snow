name: Build Release

on:
  push:
    tags:
     - 'v*'

jobs:
    build:
        name: Build Snow Release APK
        runs-on: ubuntu-latest
        steps:
            - name: Checkout branch
              uses: actions/checkout@v4
            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: 'zulu'
                  java-version: 21
            
            - uses: gradle/actions/setup-gradle@v4
              with:
                  gradle-version: 9.4.1

            - name: Write sign info
              run: |
                  if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
                      echo storePassword='${{ secrets.SIGNING_STORE_PASSWORD }}' >> keystore.properties
                      echo keyAlias='${{ secrets.SIGNING_KEY_ALIAS }}' >> keystore.properties
                      echo keyPassword='${{ secrets.SIGNING_KEY_PASSWORD }}' >> keystore.properties
                      echo storeFile='${{ github.workspace }}/key.jks' >> keystore.properties
                      echo ${{ secrets.KEYSTORE }} | base64 --decode > ${{ github.workspace }}/key.jks
                    fi
            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
            - name: Build Release apk
              run: ./gradlew assembleRelease --stacktrace
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: snow-apks
                  path: app/build/outputs/apk/**/release/*.apk

    release:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout branch
              uses: actions/checkout@v4
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: snow-apks
                  path: artifacts
            - name: Read changelog
              id: read_changelog
              run: echo "content<<EOF" >> $GITHUB_OUTPUT && cat generated/changelog.md >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                body: |
                  ${{ steps.read_changelog.outputs.content }}
                  ![Release Image](releaseImage.webp)
                files: |
                  artifacts/**/*.apk
                  generated/releaseImage.webp